name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Run Python evals
        if: matrix.os == 'ubuntu-latest'
        run: python3 python/evals/runners/safe_mode_runner.py

      - name: auto_context eval (3 fixtures, baseline lift)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python3 python/evals/runners/autocontext_eval.py --baseline naive-filename
          test -f python/evals/reports/autocontext-eval.md

      - name: Session-replay token-savings simulation
        if: matrix.os == 'ubuntu-latest'
        run: |
          python3 python/evals/runners/session_replay.py
          test -f python/evals/reports/session-replay.md

      - name: Upload eval reports
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: autocontext-eval-reports
          path: |
            python/evals/reports/autocontext-eval.md
            python/evals/reports/session-replay.md
          retention-days: 30

  setup-sh:
    name: setup.sh (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck --severity=warning setup.sh || true

      - name: Test --measure on fixture
        run: |
          mkdir -p /tmp/cos-fixture/{src,node_modules/foo,dist,.next/cache}
          for i in $(seq 1 100); do touch /tmp/cos-fixture/node_modules/foo/$i.js; done
          for i in $(seq 1 10); do touch /tmp/cos-fixture/src/$i.ts; done
          cd /tmp/cos-fixture && git init -q
          bash "$GITHUB_WORKSPACE/setup.sh" --measure | tee /tmp/measure.out
          grep -q "TOTAL:" /tmp/measure.out
          grep -q "tokens/session" /tmp/measure.out

      - name: Test install on fresh fixture
        run: |
          set -x
          rm -rf /tmp/cos-install
          mkdir -p /tmp/cos-install/src
          cd /tmp/cos-install && git init -q
          echo '{"name":"test","dependencies":{"next":"*"}}' > package.json
          bash "$GITHUB_WORKSPACE/setup.sh" 2>&1 | tee /tmp/install.out
          echo "---FILE TREE---"
          find . -type f -not -path './.git/*' | sort
          echo "---CHECKS---"
          test -f CLAUDE.md || { echo "FAIL: CLAUDE.md missing"; exit 1; }
          test -f .claudeignore || { echo "FAIL: .claudeignore missing"; exit 1; }
          test -f .claude/settings.json || { echo "FAIL: .claude/settings.json missing"; exit 1; }
          test -f .claude/commands/compact.md || { echo "FAIL: compact.md missing"; exit 1; }
          test -f .claude/commands/context.md || { echo "FAIL: context.md missing"; exit 1; }
          test -f .claude/commands/ship.md || { echo "FAIL: ship.md missing"; exit 1; }
          test -f .claude/agents/explorer.md || { echo "FAIL: explorer.md missing"; exit 1; }
          test -f .claude/output-styles/terse.md || { echo "FAIL: terse.md missing"; exit 1; }
          test -f .claude/statusline.sh || { echo "FAIL: statusline.sh missing"; exit 1; }
          test -x .claude/statusline.sh || { echo "FAIL: statusline.sh not executable"; exit 1; }
          grep -q "context-os:start" CLAUDE.md || { echo "FAIL: CLAUDE.md missing marker"; exit 1; }
          grep -q "node_modules" .claudeignore || { echo "FAIL: .claudeignore missing node_modules"; exit 1; }
          grep -q "MAX_THINKING_TOKENS" .claude/settings.json || { echo "FAIL: settings.json missing MAX_THINKING_TOKENS"; cat .claude/settings.json; exit 1; }
          grep -q "statusLine" .claude/settings.json || { echo "FAIL: settings.json missing statusLine"; cat .claude/settings.json; exit 1; }
          grep -q "ENABLE_PROMPT_CACHING_1H" .claude/settings.json || { echo "FAIL: settings.json missing ENABLE_PROMPT_CACHING_1H"; cat .claude/settings.json; exit 1; }
          grep -q "allowedTools" .claude/settings.json || { echo "FAIL: settings.json missing allowedTools"; cat .claude/settings.json; exit 1; }
          test -f .claude/commands/cheap.md || { echo "FAIL: cheap.md missing"; exit 1; }
          test -f .claude/commands/find.md || { echo "FAIL: find.md missing"; exit 1; }
          test -f .claude/commands/deps.md || { echo "FAIL: deps.md missing"; exit 1; }
          test -f .claude/commands/hot.md || { echo "FAIL: hot.md missing"; exit 1; }
          test -f .claude/commands/warm-clear.md || { echo "FAIL: warm-clear.md missing"; exit 1; }
          test -f .claude/commands/relevant.md || { echo "FAIL: relevant.md missing"; exit 1; }
          test -f .claude/commands/insights.md || { echo "FAIL: insights.md missing"; exit 1; }
          test -f .claude/commands/rebuild-graph.md || { echo "FAIL: rebuild-graph.md missing"; exit 1; }
          test -f .claude/hooks/dedup_guard.py || { echo "FAIL: dedup_guard.py missing"; exit 1; }
          test -f .claude/hooks/loop_guard.py || { echo "FAIL: loop_guard.py missing"; exit 1; }
          test -f .claude/hooks/file_size_guard.py || { echo "FAIL: file_size_guard.py missing"; exit 1; }
          test -f .claude/hooks/session_profile.py || { echo "FAIL: session_profile.py missing"; exit 1; }
          test -f .claude/hooks/auto_context.py || { echo "FAIL: auto_context.py missing"; exit 1; }
          test -f .claude/hooks/prewarm.py || { echo "FAIL: prewarm.py missing"; exit 1; }
          test -x .claude/hooks/dedup_guard.py || { echo "FAIL: dedup_guard.py not executable"; exit 1; }
          test -x .claude/hooks/file_size_guard.py || { echo "FAIL: file_size_guard.py not executable"; exit 1; }
          test -x .claude/hooks/auto_context.py || { echo "FAIL: auto_context.py not executable"; exit 1; }
          test -x .claude/hooks/prewarm.py || { echo "FAIL: prewarm.py not executable"; exit 1; }
          test -f .context-os/build_repo_graph.py || { echo "FAIL: build_repo_graph.py missing"; exit 1; }
          test -f .context-os/repo-graph.json || { echo "FAIL: repo-graph.json not generated"; exit 1; }
          grep -q "dedup_guard.py" .claude/settings.local.json || { echo "FAIL: dedup_guard not wired"; cat .claude/settings.local.json; exit 1; }
          grep -q "loop_guard.py" .claude/settings.local.json || { echo "FAIL: loop_guard not wired"; exit 1; }
          grep -q "file_size_guard.py" .claude/settings.local.json || { echo "FAIL: file_size_guard not wired"; exit 1; }
          grep -q "session_profile.py" .claude/settings.local.json || { echo "FAIL: session_profile not wired"; exit 1; }
          grep -q "auto_context.py" .claude/settings.local.json || { echo "FAIL: auto_context not wired"; exit 1; }
          grep -q "prewarm.py" .claude/settings.local.json || { echo "FAIL: prewarm not wired"; exit 1; }
          grep -q "UserPromptSubmit" .claude/settings.local.json || { echo "FAIL: UserPromptSubmit event missing"; exit 1; }
          grep -q "SessionStart" .claude/settings.local.json || { echo "FAIL: SessionStart event missing"; exit 1; }
          # dedup_guard: first call exits 0, second identical call exits 2
          echo '{"session_id":"ci","tool_name":"Read","tool_input":{"file_path":"/tmp/ci.txt"}}' | python3 .claude/hooks/dedup_guard.py
          set +e
          echo '{"session_id":"ci","tool_name":"Read","tool_input":{"file_path":"/tmp/ci.txt"}}' | python3 .claude/hooks/dedup_guard.py
          rc=$?
          set -e
          test "$rc" = "2" || { echo "FAIL: dedup_guard should exit 2 on duplicate, got $rc"; exit 1; }
          # loop_guard: 8th edit on same file exits 2
          for i in 1 2 3 4 5 6 7; do
            echo '{"session_id":"ci-loop","tool_name":"Edit","tool_input":{"file_path":"/tmp/ci-loop.py"}}' | python3 .claude/hooks/loop_guard.py
          done
          set +e
          echo '{"session_id":"ci-loop","tool_name":"Edit","tool_input":{"file_path":"/tmp/ci-loop.py"}}' | python3 .claude/hooks/loop_guard.py
          rc=$?
          set -e
          test "$rc" = "2" || { echo "FAIL: loop_guard should exit 2 on 8th edit, got $rc"; exit 1; }
          # session_profile: parses transcript, writes report
          printf '%s\n' '{"message":{"usage":{"input_tokens":100,"output_tokens":50},"content":[{"type":"tool_use","name":"Read","input":{"file_path":"/tmp/x.py"}}]}}' > /tmp/ci-transcript.jsonl
          echo '{"session_id":"ci","transcript_path":"/tmp/ci-transcript.jsonl","cwd":"'"$(pwd)"'"}' | python3 .claude/hooks/session_profile.py
          test -d .context-os/session-reports || { echo "FAIL: session-reports dir not created"; exit 1; }
          ls .context-os/session-reports/*.md >/dev/null || { echo "FAIL: no session report written"; exit 1; }
          # file_size_guard: allow small file, block large file without offset
          printf 'small\n' > /tmp/ci-small.txt
          set +e
          echo '{"tool_name":"Read","tool_input":{"file_path":"/tmp/ci-small.txt"}}' | python3 .claude/hooks/file_size_guard.py
          rc=$?
          set -e
          test "$rc" = "0" || { echo "FAIL: file_size_guard should allow small file, got $rc"; exit 1; }
          python3 -c "print('x\n'*2000)" > /tmp/ci-big.txt
          set +e
          echo '{"tool_name":"Read","tool_input":{"file_path":"/tmp/ci-big.txt"}}' | python3 .claude/hooks/file_size_guard.py 2>/dev/null
          rc=$?
          set -e
          test "$rc" = "2" || { echo "FAIL: file_size_guard should block 2000-line file, got $rc"; exit 1; }
          # With offset set, should allow even big files
          set +e
          echo '{"tool_name":"Read","tool_input":{"file_path":"/tmp/ci-big.txt","offset":1,"limit":50}}' | python3 .claude/hooks/file_size_guard.py
          rc=$?
          set -e
          test "$rc" = "0" || { echo "FAIL: file_size_guard should allow with offset, got $rc"; exit 1; }
          # Seed a source file so the graph has matchable symbols, then rebuild.
          printf 'def myHelperFunction():\n    return 1\n\nclass MyTestClass:\n    pass\n' > src/seed.py
          python3 .context-os/build_repo_graph.py .
          # auto_context: short prompt -> no output; prompt with symbol -> injected block
          short_out=$(echo '{"prompt":"ok","cwd":"'"$(pwd)"'"}' | python3 .claude/hooks/auto_context.py)
          test -z "$short_out" || { echo "FAIL: auto_context should be silent on short prompt, got: $short_out"; exit 1; }
          long_out=$(echo '{"prompt":"please help me refactor the myHelperFunction and MyTestClass logic","cwd":"'"$(pwd)"'"}' | python3 .claude/hooks/auto_context.py)
          echo "$long_out" | grep -q "context-os:autocontext" || { echo "FAIL: auto_context should emit block on keyword match. output: $long_out"; cat .context-os/repo-graph.json | python3 -m json.tool | head -40; exit 1; }
          # auto_context: disabled via env
          disabled=$(echo '{"prompt":"please help me refactor the myHelperFunction","cwd":"'"$(pwd)"'"}' | CONTEXT_OS_AUTOCONTEXT=0 python3 .claude/hooks/auto_context.py)
          test -z "$disabled" || { echo "FAIL: auto_context should be silent when disabled, got: $disabled"; exit 1; }
          # prewarm: emits git + hot files on a git-initialized cwd
          prewarm_out=$(echo '{"cwd":"'"$(pwd)"'"}' | python3 .claude/hooks/prewarm.py)
          echo "$prewarm_out" | grep -q "context-os:prewarm" || { echo "FAIL: prewarm should emit brief on git repo. output: $prewarm_out"; exit 1; }
          # prewarm: disabled via env
          pre_disabled=$(echo '{"cwd":"'"$(pwd)"'"}' | CONTEXT_OS_PREWARM=0 python3 .claude/hooks/prewarm.py)
          test -z "$pre_disabled" || { echo "FAIL: prewarm should be silent when disabled, got: $pre_disabled"; exit 1; }
          # prewarm: stale graph triggers /rebuild-graph hint when autobuild=0
          touch -t 202301010000 .context-os/repo-graph.json
          stale_out=$(echo '{"cwd":"'"$(pwd)"'"}' | CONTEXT_OS_GRAPH_AUTOBUILD=0 python3 .claude/hooks/prewarm.py)
          echo "$stale_out" | grep -q "rebuild-graph" || { echo "FAIL: stale graph should suggest /rebuild-graph. output: $stale_out"; exit 1; }
          # prewarm: stale graph triggers background rebuild when autobuild on
          touch -t 202301010000 .context-os/repo-graph.json
          auto_out=$(echo '{"cwd":"'"$(pwd)"'"}' | python3 .claude/hooks/prewarm.py)
          echo "$auto_out" | grep -q "rebuilding in background" || { echo "FAIL: stale graph with autobuild on should rebuild. output: $auto_out"; exit 1; }
          # repo-graph.json structure: has symbol_index and files keys
          python3 -c "
          import json, sys
          g = json.load(open('.context-os/repo-graph.json'))
          for key in ['version', 'files', 'symbol_index', 'imported_by', 'hot_files']:
              if key not in g: sys.exit(f'FAIL: repo-graph.json missing {key}')
          print(f'repo-graph OK: {g[\"file_count\"]} files, {g[\"symbol_count\"]} symbols')
          "
          # statusLine script should produce output when piped JSON
          echo '{"model":{"display_name":"test"},"workspace":{"current_dir":"/tmp/cos-install"}}' | bash .claude/statusline.sh > /tmp/sl.out
          test -s /tmp/sl.out || { echo "FAIL: statusline.sh produced no output"; exit 1; }

      - name: Test idempotent re-run
        run: |
          cd /tmp/cos-install
          bash "$GITHUB_WORKSPACE/setup.sh"
          test $(grep -c "context-os:start" CLAUDE.md) -eq 1

      - name: Test --status
        run: |
          cd /tmp/cos-install
          bash "$GITHUB_WORKSPACE/setup.sh" --status | tee /tmp/status.out
          grep -q "CLAUDE.md" /tmp/status.out
          grep -q ".claudeignore" /tmp/status.out

      - name: Test --global install on fake HOME
        run: |
          set -x
          FAKE_HOME=/tmp/cos-fake-home
          rm -rf "$FAKE_HOME"
          mkdir -p "$FAKE_HOME"
          HOME="$FAKE_HOME" bash "$GITHUB_WORKSPACE/setup.sh" --global
          test -f "$FAKE_HOME/.claude/CLAUDE.md" || { echo "FAIL: global CLAUDE.md missing"; exit 1; }
          test -f "$FAKE_HOME/.claude/settings.json" || { echo "FAIL: global settings.json missing"; exit 1; }
          grep -q "context-os:start" "$FAKE_HOME/.claude/CLAUDE.md"
          grep -q "MAX_THINKING_TOKENS" "$FAKE_HOME/.claude/settings.json"
          # Idempotent: run again, verify single marker block
          HOME="$FAKE_HOME" bash "$GITHUB_WORKSPACE/setup.sh" --global
          test $(grep -c "context-os:start" "$FAKE_HOME/.claude/CLAUDE.md") -eq 1

      - name: Test --uninstall preserves user content
        run: |
          cd /tmp/cos-install
          bash "$GITHUB_WORKSPACE/setup.sh" --uninstall
          test ! -f .claudeignore
          test ! -f .claude/settings.json
          test ! -f .claude/output-styles/terse.md
          test ! -f .claude/statusline.sh
          test ! -f .claude/hooks/dedup_guard.py
          test ! -f .claude/hooks/loop_guard.py
          test ! -f .claude/hooks/file_size_guard.py
          test ! -f .claude/hooks/session_profile.py
          test ! -f .claude/hooks/auto_context.py
          test ! -f .claude/hooks/prewarm.py
          test ! -f .context-os/build_repo_graph.py
          test ! -f .context-os/repo-graph.json
          test ! -f .claude/commands/find.md
          test ! -f .claude/commands/deps.md
          test ! -f .claude/commands/hot.md
          test ! -f .claude/commands/warm-clear.md
          test ! -f .claude/commands/relevant.md
          test ! -f .claude/commands/insights.md
          test ! -f .claude/commands/rebuild-graph.md
